<!DOCTYPE html>
<html class="staticrypt-html">

        <style>
            :root {
                --bg-page: #f5f5f5;
                --bg-form: #ffffff;
                --bg-input: #f2f2f2;
                --text-color: #333333;
                --text-muted: #666666;
                --border-color: #e0e0e0;
                --btn-bg: #4a90d9;
                --btn-hover: #3a7bc8;
                --hr-color: #e0e0e0;
            }

            @media (prefers-color-scheme: dark) {
                :root {
                    --bg-page: #1e1e1e;
                    --bg-form: #2a2a2a;
                    --bg-input: #383838;
                    --text-color: #d4d4d4;
                    --text-muted: #999999;
                    --border-color: #444444;
                    --btn-bg: #4a90d9;
                    --btn-hover: #5aa0e9;
                    --hr-color: #444444;
                }
            }

            * {
                box-sizing: border-box;
            }

            .staticrypt-html,
            .staticrypt-body {
                height: 100%;
                margin: 0;
            }

            .staticrypt-content {
                height: 100%;
                background: var(--bg-page);
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
                -webkit-font-smoothing: antialiased;
                color: var(--text-color);
            }

            .staticrypt-page {
                width: 360px;
                padding: 8% 0 0;
                margin: auto;
            }

            .staticrypt-form {
                position: relative;
                z-index: 1;
                background: var(--bg-form);
                max-width: 360px;
                margin: 0 auto 100px;
                padding: 45px;
                text-align: center;
                box-shadow: 0 0 20px 0 rgba(0, 0, 0, 0.15), 0 5px 5px 0 rgba(0, 0, 0, 0.1);
                border-radius: 4px;
            }

            .staticrypt-title {
                font-size: 1.5em;
                margin: 0 0 0.5em;
                color: var(--text-color);
            }

            .staticrypt-instructions {
                margin-top: -0.5em;
                margin-bottom: 1em;
                color: var(--text-muted);
                font-size: 0.95em;
            }

            .staticrypt-hr {
                margin-top: 20px;
                margin-bottom: 20px;
                border: 0;
                border-top: 1px solid var(--hr-color);
            }

            .staticrypt-password-container {
                position: relative;
                background: var(--bg-input);
                width: 100%;
                border: 0;
                margin: 0 0 15px;
            }

            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                background: transparent;
                border: 0;
                font-size: 14px;
                outline: 0;
                padding: 15px 40px 15px 15px;
                width: 100%;
                color: var(--text-color);
            }

            .staticrypt-form input[type="password"]::placeholder,
            .staticrypt-form input[type="text"]::placeholder {
                color: var(--text-muted);
            }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 20px;
                opacity: 50%;
                padding: 13px;
                position: absolute;
                right: 0;
                top: 50%;
                transform: translateY(-50%);
                width: 20px;
                filter: var(--icon-filter, none);
            }

            @media (prefers-color-scheme: dark) {
                .staticrypt-toggle-password-visibility {
                    filter: invert(1);
                }
            }

            .staticrypt-form .staticrypt-decrypt-button {
                text-transform: uppercase;
                outline: 0;
                background: var(--btn-bg);
                width: 100%;
                border: 0;
                padding: 15px;
                color: #ffffff;
                font-size: 14px;
                cursor: pointer;
                letter-spacing: 0.05em;
                border-radius: 2px;
                transition: background 0.15s ease;
            }

            .staticrypt-form .staticrypt-decrypt-button:hover,
            .staticrypt-form .staticrypt-decrypt-button:active,
            .staticrypt-form .staticrypt-decrypt-button:focus {
                background: var(--btn-hover);
            }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                margin-bottom: 1em;
                color: var(--text-muted);
                font-size: 0.9em;
            }

            .staticrypt-remember input[type="checkbox"] {
                transform: scale(1.5);
                margin-right: 1em;
                accent-color: var(--btn-bg);
            }

            .hidden {
                display: none !important;
            }

            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                border: 0.25em solid var(--border-color);
                border-right-color: var(--btn-bg);
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }

            @keyframes spinner-border {
                100% { transform: rotate(360deg); }
            }

            @media screen and (-webkit-min-device-pixel-ratio: 0) {
                .staticrypt-form input[type="password"],
                .staticrypt-form input[type="text"] {
                    font-size: 16px;
                }
            }
        </style>
    </head>

                    toggleIcon.alt = templateToggleAltHide;

                const password = document.getElementById("staticrypt-password").value,
