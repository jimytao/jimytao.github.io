<!-- Layout toggle: sidebar collapse + panel hide -->
<link rel="stylesheet" href="{{ '/assets/css/layout-toggle.css' | relative_url }}">

<!-- Sidebar tab toggle (fixed, hugs the right edge of the sidebar) -->
<button id="sidebar-toggle" type="button" aria-label="收起侧边栏" title="收起/展开菜单">
  <i class="fas fa-angle-double-left"></i>
</button>

<!-- Panel tab toggle (fixed, hugs the left edge of the panel / right edge of the viewport) -->
<button id="panel-toggle" type="button" aria-label="隐藏/显示右侧栏" title="隐藏/显示右侧栏">
  <i class="fas fa-angle-double-right"></i>
</button>

<script defer src="{{ '/assets/js/layout-toggle.js' | relative_url }}"></script>
